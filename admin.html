<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Admin Panel | One Station Cafe</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{--p:#7C3AED;--pd:#5B21B6;--pl:#C4A6F5;--o:#D4AF37;--y:#F4C430;--g:#48C479;--gd:#3CB371;--d:#1A0B2E;--t:#1C1C2B;--t2:#4F4F4F;--t3:#696969;--bg:#F8F8F8;--bg3:#F6F1FC;--r:16px;--rs:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:linear-gradient(160deg,#1A0B2E,#2D1653 40%,#1A0B2E);min-height:100vh;color:var(--t)}
img{max-width:100%}button{font-family:inherit;cursor:pointer;border:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--p);border-radius:10px}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:24px;padding:40px 30px;max-width:380px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.4);text-align:center}
.login-logo{width:80px;height:80px;border-radius:20px;background:linear-gradient(145deg,var(--p),var(--pd) 60%,var(--o));display:flex;align-items:center;justify-content:center;color:#fff;font-size:32px;font-weight:800;font-family:'Playfair Display',serif;margin:0 auto 18px;box-shadow:0 8px 20px rgba(124,58,237,.4)}
.login-box h2{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:4px}
.login-box p{color:var(--t3);font-size:13px;margin-bottom:24px}
.login-box input{width:100%;padding:14px 16px;border:2px solid #eee;border-radius:12px;margin-bottom:12px;font-size:14px;outline:none;transition:.2s}
.login-box input:focus{border-color:var(--p)}
.login-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;border-radius:12px;font-size:15px;font-weight:800;margin-top:8px;box-shadow:0 8px 20px rgba(124,58,237,.35)}
.login-err{color:#c0392b;font-size:12.5px;margin-top:10px;display:none}

/* DASHBOARD */
.dash{display:none;max-width:1000px;margin:0 auto;padding:16px}
.dash.show{display:block}
.dash-head{display:flex;justify-content:space-between;align-items:center;padding:14px 4px;color:#fff}
.dash-head h1{font-family:'Playfair Display',serif;font-size:22px;display:flex;align-items:center;gap:10px}
.dash-head h1 span{background:linear-gradient(90deg,var(--o),#F4C430);-webkit-background-clip:text;background-clip:text;color:transparent}
.logout-btn{background:rgba(255,255,255,.1);color:#fff;padding:9px 16px;border-radius:10px;font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:6px}
.logout-btn:hover{background:rgba(255,255,255,.2)}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px;text-align:center;color:#fff}
.stat-card b{font-size:26px;display:block;background:linear-gradient(90deg,var(--o),#fff);-webkit-background-clip:text;background-clip:text;color:transparent;font-family:'Playfair Display',serif}
.stat-card span{font-size:11px;opacity:.8}

.tabs-row{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto}
.dtab{padding:11px 20px;background:rgba(255,255,255,.08);color:#fff;border-radius:12px;font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0}
.dtab.active{background:linear-gradient(135deg,var(--o),#B8860B);color:#1A0B2E}

.panel{display:none}.panel.show{display:block}

/* SHOP TOGGLE */
.shop-toggle-box{background:#fff;border-radius:16px;padding:16px;margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap}
.shop-btn{flex:1;padding:12px;border-radius:10px;font-size:12.5px;font-weight:700;background:var(--bg3);color:var(--t2);min-width:90px}
.shop-btn.active{background:var(--p);color:#fff}

/* ORDER TICKET */
.ticket{background:#fff;border-radius:16px;padding:16px;margin-bottom:14px;border-left:5px solid var(--p);box-shadow:0 6px 20px rgba(0,0,0,.06)}
.ticket.pending{border-left-color:var(--y);animation:pulseBorder 1.5s infinite}
@keyframes pulseBorder{0%,100%{box-shadow:0 6px 20px rgba(0,0,0,.06)}50%{box-shadow:0 6px 30px rgba(244,196,48,.4)}}
.ticket.accepted{border-left-color:var(--g)}
.ticket.rejected{border-left-color:#c0392b;opacity:.7}
.t-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.t-id{font-weight:800;font-size:14px}
.t-badge{font-size:10.5px;font-weight:800;padding:4px 10px;border-radius:20px}
.t-badge.pending{background:#FFF3CD;color:#7a4d00}
.t-badge.accepted{background:#E8F8EE;color:#1E7A44}
.t-badge.rejected{background:#FDEAEA;color:#B3261E}
.t-row{font-size:13px;margin-bottom:5px;display:flex;align-items:center;gap:8px}
.t-row i{width:16px;color:var(--p)}
.t-items{background:var(--bg3);border-radius:10px;padding:10px;margin:10px 0;font-size:12.5px;white-space:pre-line}
.t-total{font-size:18px;font-weight:800;color:var(--pd);margin:8px 0}
.t-pay{padding:8px 12px;border-radius:8px;font-size:12px;font-weight:700}
.t-pay.paid{background:#E8F8EE;color:#1E7A44}.t-pay.cod{background:#FFF3E0;color:#B36B00}
.t-ss{max-width:150px;border-radius:8px;margin-top:8px;cursor:pointer;border:1px solid #eee}
.t-loc{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);color:var(--pd);padding:7px 12px;border-radius:8px;font-size:12px;font-weight:700;margin-top:6px}
.t-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.t-actions button,.t-actions a{flex:1;padding:11px;border-radius:10px;font-size:12.5px;font-weight:700;text-align:center;color:#fff;min-width:80px}
.btn-accept{background:var(--g)}.btn-reject{background:#c0392b}.btn-call{background:#333}.btn-wa{background:#25D366}
.no-orders{text-align:center;padding:60px 20px;color:rgba(255,255,255,.6)}
.no-orders i{font-size:40px;margin-bottom:12px;display:block}

/* MENU EDITOR */
.menu-editor-item{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:center}
.menu-editor-item img{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0}
.mei-info{flex:1;min-width:0}
.mei-info b{font-size:13.5px;display:block}
.mei-info span{font-size:11.5px;color:var(--t3)}
.mei-edit-btn{background:var(--bg3);color:var(--pd);padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700}
.cat-select{margin-bottom:12px}
.cat-select select{width:100%;padding:12px;border-radius:10px;border:1.5px solid #eee;font-size:13px;background:#fff}

.edit-modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.edit-modal-ov.show{display:flex}
.edit-modal{background:#fff;border-radius:20px;padding:24px;max-width:400px;width:100%;max-height:88vh;overflow-y:auto}
.edit-modal h3{font-family:'Playfair Display',serif;margin-bottom:16px}
.edit-modal label{font-size:12.5px;font-weight:700;color:var(--t2);display:block;margin:12px 0 6px}
.edit-modal input,.edit-modal textarea{width:100%;padding:12px;border:1.5px solid #eee;border-radius:10px;font-size:14px}
.edit-modal img.preview{width:100%;height:140px;object-fit:cover;border-radius:10px;margin-top:8px}
.em-actions{display:flex;gap:8px;margin-top:18px}
.em-actions button{flex:1;padding:13px;border-radius:10px;font-weight:700;font-size:13px}
.em-save{background:var(--p);color:#fff}.em-cancel{background:#eee;color:#333}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:#fff;padding:14px 22px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.2);z-index:9999;font-weight:700;font-size:13px;transition:.4s;border-left:4px solid var(--p)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{border-left-color:#c0392b}.toast.success{border-left-color:var(--g)}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
<div class="login-box">
<div class="login-logo">OS</div>
<h2>Admin Login</h2>
<p>One Station Cafe — Owner Dashboard</p>
<input type="email" id="loginEmail" placeholder="Email" autocomplete="username">
<input type="password" id="loginPass" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
<button class="login-btn" onclick="doLogin()"><i class="fas fa-lock"></i> Login</button>
<div class="login-err" id="loginErr"></div>
</div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dash">
<div class="dash-head">
<h1>One <span>Station</span> Admin</h1>
<button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
</div>

<div class="stats-row">
<div class="stat-card"><b id="statTotal">0</b><span>Total Orders</span></div>
<div class="stat-card"><b id="statPending">0</b><span>Pending</span></div>
<div class="stat-card"><b id="statRevenue">₹0</b><span>Accepted Revenue</span></div>
</div>

<div class="tabs-row">
<button class="dtab active" onclick="switchTab('orders')" id="tabBtnOrders"><i class="fas fa-receipt"></i> Orders</button>
<button class="dtab" onclick="switchTab('menu')" id="tabBtnMenu"><i class="fas fa-utensils"></i> Menu Editor</button>
<button class="dtab" onclick="switchTab('shop')" id="tabBtnShop"><i class="fas fa-store"></i> Shop Status</button>
</div>

<div class="panel show" id="panelOrders">
<div id="ordersList"></div>
</div>

<div class="panel" id="panelMenu">
<div class="cat-select">
<select id="menuCatSelect" onchange="renderMenuEditor()"></select>
</div>
<div id="menuEditorList"></div>
</div>

<div class="panel" id="panelShop">
<div class="shop-toggle-box">
<button class="shop-btn" onclick="setShop('auto')" id="shopAuto"><i class="fas fa-clock"></i><br>Auto (Time-based)</button>
<button class="shop-btn" onclick="setShop('open')" id="shopOpenBtn"><i class="fas fa-door-open"></i><br>Force OPEN</button>
<button class="shop-btn" onclick="setShop('closed')" id="shopClosedBtn"><i class="fas fa-door-closed"></i><br>Force CLOSED</button>
</div>
<p style="color:rgba(255,255,255,.7);font-size:12.5px;padding:0 4px">Ye setting turant customer ki website par bhi update ho jaati hai.</p>
</div>
</div>

<!-- EDIT MODAL -->
<div class="edit-modal-ov" id="editModalOv">
<div class="edit-modal">
<h3>Edit Item</h3>
<label>Item Name</label>
<input id="emName">
<label>Price (₹)</label>
<input id="emPrice" type="number">
<label>Photo</label>
<input type="file" id="emPhoto" accept="image/*" onchange="previewEmPhoto()">
<img class="preview" id="emPreview" style="display:none">
<label style="display:flex;align-items:center;gap:8px;margin-top:14px"><input type="checkbox" id="emHidden" style="width:auto"> Mark as unavailable / hide from menu</label>
<div class="em-actions">
<button class="em-cancel" onclick="closeEditModal()">Cancel</button>
<button class="em-save" onclick="saveMenuEdit()">Save</button>
</div>
</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDNIQ4ePWSZUmq7bMaoff4GsAu2EVpU1_w",
  authDomain: "one-station-cafe-adf58.firebaseapp.com",
  projectId: "one-station-cafe-adf58",
  storageBucket: "one-station-cafe-adf58.firebasestorage.app",
  messagingSenderId: "570687348186",
  appId: "1:570687348186:web:cd0410cb9a3b7d7bdaf4e3"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function toast(msg, type){
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show ' + (type||'');
    setTimeout(()=>t.classList.remove('show'), 3000);
}

/* ===== AUTH ===== */
function doLogin(){
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    const errEl = document.getElementById('loginErr');
    errEl.style.display = 'none';
    auth.signInWithEmailAndPassword(email, pass).catch(err=>{
        errEl.textContent = 'Login failed: Wrong email or password';
        errEl.style.display = 'block';
    });
}
function doLogout(){ auth.signOut(); }
auth.onAuthStateChanged(user=>{
    if(user){
        document.getElementById('loginWrap').style.display = 'none';
        document.getElementById('dash').classList.add('show');
        startOrdersListener();
        loadShopStatus();
    } else {
        document.getElementById('loginWrap').style.display = 'flex';
        document.getElementById('dash').classList.remove('show');
    }
});

/* ===== TABS ===== */
function switchTab(name){
    document.querySelectorAll('.dtab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));
    document.getElementById('tabBtn'+name[0].toUpperCase()+name.slice(1)).classList.add('active');
    document.getElementById('panel'+name[0].toUpperCase()+name.slice(1)).classList.add('show');
    if(name==='menu') renderMenuEditor();
}

/* ===== SOUND + VOICE ALERT ===== */
let bellAudio = null, bellInterval = null;
function beep(){
    try{
        const ctx = new (window.AudioContext||window.webkitAudioContext)();
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = 880; o.type = 'sine';
        g.gain.setValueAtTime(0.35, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.5);
        o.start(); o.stop(ctx.currentTime+0.5);
    }catch(e){}
}
function startLoudAlert(){
    beep(); setTimeout(beep,350); setTimeout(beep,700);
    if(bellInterval) clearInterval(bellInterval);
    let count=0;
    bellInterval = setInterval(()=>{ beep(); count++; if(count>10) clearInterval(bellInterval); }, 1500);
}
function stopLoudAlert(){ if(bellInterval) clearInterval(bellInterval); }
function speakOrder(o){
    if(!('speechSynthesis' in window)) return;
    const voices = speechSynthesis.getVoices();
    const maleVoice = voices.find(v=>/male/i.test(v.name)) || voices.find(v=>/hindi|india/i.test(v.lang)) || voices[0];
    const items = o.items.map(i=>i.qty+' '+i.name).join(', ');
    const msg = new SpeechSynthesisUtterance(`Naya order aaya hai! ${o.name} ne ${o.total} rupaye ka order kiya hai. Items: ${items}.`);
    if(maleVoice) msg.voice = maleVoice;
    msg.rate = 0.95; msg.pitch = 0.85;
    speechSynthesis.speak(msg);
}
document.addEventListener('click', ()=>{ stopLoudAlert(); }, {once:false});

/* ===== ORDERS (real-time) ===== */
let knownOrderIds = new Set();
let firstLoad = true;
function startOrdersListener(){
    db.collection('orders').orderBy('createdAt','desc').limit(100).onSnapshot(snap=>{
        const orders = [];
        snap.forEach(doc=>orders.push(doc.data()));

        if(!firstLoad){
            orders.forEach(o=>{
                if(!knownOrderIds.has(o.id) && o.status==='pending'){
                    startLoudAlert();
                    speakOrder(o);
                    toast('🔔 New order: '+o.id, 'success');
                }
            });
        }
        knownOrderIds = new Set(orders.map(o=>o.id));
        firstLoad = false;

        renderOrders(orders);
        document.getElementById('statTotal').textContent = orders.length;
        document.getElementById('statPending').textContent = orders.filter(o=>o.status==='pending').length;
        document.getElementById('statRevenue').textContent = '₹'+orders.filter(o=>o.status==='accepted').reduce((s,o)=>s+(o.total||0),0);
    }, err=>{ console.error(err); toast('Could not load orders — check connection','error'); });
}
function renderOrders(orders){
    const el = document.getElementById('ordersList');
    if(!orders.length){ el.innerHTML = '<div class="no-orders"><i class="far fa-clipboard"></i>No orders yet</div>'; return; }
    el.innerHTML = orders.map(o=>{
        const sn = o.status||'pending';
        const label = sn==='pending'?'🔴 Pending':sn==='accepted'?'✅ Accepted':'❌ Rejected';
        return `<div class="ticket ${sn}">
            <div class="t-top">
                <span class="t-id"><i class="fas fa-receipt"></i> ${o.id}</span>
                <span class="t-badge ${sn}">${label}</span>
                <span style="font-size:11px;color:#999">${o.date||''} ${o.time||''}</span>
            </div>
            <div class="t-row"><i class="fas fa-user"></i> <b>${o.name}</b></div>
            <div class="t-row"><i class="fas fa-phone"></i> <a href="tel:${o.phone}">${o.phone}</a></div>
            ${o.type==='delivery' ? `<div class="t-row"><i class="fas fa-map-marker-alt"></i> ${o.address||'-'}</div>` : ''}
            ${o.location ? `<a class="t-loc" href="${o.location}" target="_blank"><i class="fas fa-location-crosshairs"></i> Open exact location on Google Maps</a>` : ''}
            <div class="t-items">${(o.items||[]).map(i=>`${i.qty}× ${i.name} — ₹${i.sub}`).join('\n')}</div>
            <div class="t-total">₹${o.total}</div>
            <div class="t-pay ${o.paid?'paid':'cod'}">${o.paid ? `✅ PAID via UPI · UTR: ${o.txnId||'-'}` : '💵 Cash on Delivery'}</div>
            ${o.paymentScreenshot ? `<img class="t-ss" src="${o.paymentScreenshot}" onclick="window.open(this.src)">` : ''}
            ${sn==='pending' ? `<div class="t-actions">
                <button class="btn-accept" onclick="setOrderStatus('${o.id}','accepted')"><i class="fas fa-check"></i> Accept</button>
                <button class="btn-reject" onclick="setOrderStatus('${o.id}','rejected')"><i class="fas fa-times"></i> Reject</button>
                <a class="btn-call" href="tel:${o.phone}"><i class="fas fa-phone"></i></a>
            </div>` : ''}
        </div>`;
    }).join('');
}
function setOrderStatus(id, status){
    db.collection('orders').doc(id).update({status}).then(()=>{
        toast('Order '+id+' '+status, status==='accepted'?'success':'error');
    }).catch(()=>toast('Failed to update order','error'));
}

/* ===== SHOP STATUS ===== */
function loadShopStatus(){
    db.collection('settings').doc('shop').onSnapshot(doc=>{
        const v = doc.exists ? (doc.data().override||'auto') : 'auto';
        document.querySelectorAll('.shop-btn').forEach(b=>b.classList.remove('active'));
        if(v==='auto') document.getElementById('shopAuto').classList.add('active');
        if(v==='open') document.getElementById('shopOpenBtn').classList.add('active');
        if(v==='closed') document.getElementById('shopClosedBtn').classList.add('active');
    });
}
function setShop(v){
    db.collection('settings').doc('shop').set({override:v}).then(()=>toast('Shop status updated','success'));
}

/* ===== MENU EDITOR ===== */
const MENU_REF = {
wraps:[['Chicken Wrap',120],['Special Wrap',140],['Nuggets Wrap',140]],
pizza:[['Margarita Pizza',160],['Cheese Pizza',170],['Cheesy Chicken Pizza',200],['Margarita Combo',200],['Cheesy Chicken Pizza Combo',260],['Special Italian Pizza',300]],
pasta:[['Alfredo Pasta (Veg)',150],['Alfredo Pasta (Non-Veg)',180],['Arabiata Pasta (Veg)',150],['Arabiata Pasta (Non-Veg)',180]],
broasted:[['4 Piece Broasted Chicken',220],['8 Piece Broasted Chicken',400],['Combo Special 8pcs Broasted',500]],
burgers:[['Chicken Patty Burger',89],['Chicken Zinger Burger',110],['Cheesy Zinger Burger',130],['Special Loaded Cheese Burger',180],['One Bite Burger (6 Mini)',180]],
quickbites:[['Chicken Nuggets (7pcs)',90],['Chicken Popcorn (8pcs)',90],['Chicken Strips (4pcs)',150]],
sandwich:[['Veg Sandwich',70],['Roasted Chicken Sandwich',90],['Cheesy Chicken Sandwich',100],['Club Sandwich',150]],
fries:[['Classic Fries',60],['Peri Peri Fries',70],['Chicken Loaded Fries',150]],
shakes:[['Strawberry ThickShake',150],['VerryBerry ThickShake',150],['Creamy Vanilla ThickShake',150],['Nutella Brownie Shake',150],['Kesar Pista Shake',150],['Banana Caramel Shake',150],['Mango Mania Shake',150],['KitKat Crunch Shake',150],['Oreo Crumble Shake',150]],
mojitos:[['Classic Mint Mojito',90],['Blue Lagoon Mojito',90],['Watermelon Mojito',90],['Kiwi Mojito',90],['Green Apple Mojito',90],['Orange Mojito',90]],
juices:[['Mosambi Juice',59],['Orange Juice',59],['Apple Juice',69],['Pomegranate Juice',69],['Pineapple Juice',69],['Musk Melon Juice',69],['Black Grapes Juice',69],['Papaya Juice',69],['Watermelon Juice',69],['Cocktail Juice',69],['Kiwi Juice',89],['Avocado Juice',99]],
special:[['Dubai Desert Special (Small)',200],['Dubai Desert Special (Large)',250]]
};
const CAT_TITLES = {wraps:'🌯 Wraps',pizza:'🍕 Pizza',pasta:'🍝 Pasta',broasted:'🍗 Broasted',burgers:'🍔 Burgers',quickbites:'🍗 Quick Bites',sandwich:'🥪 Sandwich',fries:'🍟 Fries',shakes:'🥛 Shakes',mojitos:'🍹 Mojitos',juices:'🧃 Juices',special:'✨ Speciality'};

let menuOverridesCache = {};
function initMenuCatSelect(){
    const sel = document.getElementById('menuCatSelect');
    sel.innerHTML = Object.keys(MENU_REF).map(c=>`<option value="${c}">${CAT_TITLES[c]}</option>`).join('');
}
async function renderMenuEditor(){
    const cat = document.getElementById('menuCatSelect').value;
    const snap = await db.collection('menu_overrides').get();
    menuOverridesCache = {};
    snap.forEach(doc=>{ menuOverridesCache[doc.id] = {...doc.data(), _docId: doc.id}; });

    const items = MENU_REF[cat] || [];
    const el = document.getElementById('menuEditorList');
    el.innerHTML = items.map(([name, price])=>{
        const key = cat+'::'+name;
        const ov = menuOverridesCache[key];
        const displayName = ov?.name || name;
        const displayPrice = ov?.price || price;
        const displayImg = ov?.img || '';
        const hidden = ov?.hidden;
        return `<div class="menu-editor-item">
            ${displayImg ? `<img src="${displayImg}">` : `<div style="width:56px;height:56px;border-radius:10px;background:#f0f0f0;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#ccc"><i class="fas fa-image"></i></div>`}
            <div class="mei-info"><b>${displayName}${hidden?' (Hidden)':''}</b><span>₹${displayPrice}</span></div>
            <button class="mei-edit-btn" onclick="openEditModal('${cat}','${name.replace(/'/g,"\\'")}',${price})"><i class="fas fa-pen"></i> Edit</button>
        </div>`;
    }).join('');
}

let currentEdit = null;
function openEditModal(cat, originalName, originalPrice){
    const key = cat+'::'+originalName;
    const ov = menuOverridesCache[key] || {};
    currentEdit = {cat, originalName, key};
    document.getElementById('emName').value = ov.name || originalName;
    document.getElementById('emPrice').value = ov.price || originalPrice;
    document.getElementById('emHidden').checked = !!ov.hidden;
    const preview = document.getElementById('emPreview');
    if(ov.img){ preview.src = ov.img; preview.style.display = 'block'; } else { preview.style.display = 'none'; }
    document.getElementById('emPhoto').value = '';
    document.getElementById('editModalOv').classList.add('show');
}
function closeEditModal(){ document.getElementById('editModalOv').classList.remove('show'); currentEdit = null; }
function previewEmPhoto(){
    const file = document.getElementById('emPhoto').files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e=>{
        const img = new Image();
        img.onload = ()=>{
            const maxW = 500, scale = Math.min(1, maxW/img.width);
            const canvas = document.createElement('canvas');
            canvas.width = img.width*scale; canvas.height = img.height*scale;
            canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
            const compressed = canvas.toDataURL('image/jpeg', 0.7);
            document.getElementById('emPreview').src = compressed;
            document.getElementById('emPreview').style.display = 'block';
            document.getElementById('emPreview').dataset.newImg = compressed;
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}
function saveMenuEdit(){
    if(!currentEdit) return;
    const preview = document.getElementById('emPreview');
    const data = {
        category: currentEdit.cat,
        originalName: currentEdit.originalName,
        name: document.getElementById('emName').value.trim(),
        price: parseInt(document.getElementById('emPrice').value) || 0,
        hidden: document.getElementById('emHidden').checked
    };
    if(preview.dataset.newImg) data.img = preview.dataset.newImg;
    db.collection('menu_overrides').doc(currentEdit.key).set(data, {merge:true}).then(()=>{
        toast('Menu item updated!', 'success');
        closeEditModal();
        renderMenuEditor();
    }).catch(()=>toast('Failed to save — try a smaller photo','error'));
}

initMenuCatSelect();
if(speechSynthesis) speechSynthesis.getVoices();
</script>
